services:
  modelrank:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3008}:${PORT:-3008}"
    volumes:
      # Mount entire data directory to ensure config, results, tests, and scripts all persist
      - ./data:/app/data
    environment:
      - PORT=${PORT:-3008}
      - EVAL_DIR=/app/data
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PUBLIC_MODE=${PUBLIC_MODE:-false}
    container_name: modelrank
    restart: unless-stopped
